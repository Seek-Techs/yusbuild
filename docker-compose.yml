# YusBuild - Docker Compose
# Pile Reinforcement Quantification API
#
# Usage:
# docker compose up --build
# docker compose up -d
# docker compose down
# docker compose logs -f

services:
  db:
    image: postgres:16-alpine
    container_name: yusbuild-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yusbuild}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: yusbuild-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      POSTGRES_DB: ${POSTGRES_DB:-yusbuild}
      POSTGRES_USER: ${POSTGRES_USER:-yusbuild_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,*}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_pile_types &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 60 --access-logfile - --error-logfile - config.wsgi:application"

volumes:
  postgres_data:
