name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-lint-migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: yusbuild
          POSTGRES_USER: yusbuild
          POSTGRES_PASSWORD: yusbuild
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U yusbuild" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: config.test_settings
      POSTGRES_DB: yusbuild
      POSTGRES_USER: yusbuild
      POSTGRES_PASSWORD: yusbuild
      DATABASE_URL: postgres://yusbuild:yusbuild@localhost:5432/yusbuild
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint with Ruff
        run: ruff check .
      - name: Check formatting with Ruff
        run: ruff format --check .
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests with coverage
        run: pytest
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov
  docker-build:
    runs-on: ubuntu-latest
    needs: test-lint-migrate
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t yusbuild:ci .
